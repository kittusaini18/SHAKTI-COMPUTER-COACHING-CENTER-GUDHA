<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Form - SHAKTI Computer & Coaching Center</title>
    <link rel="stylesheet" href="enrollment.css">
</head>
<body>
    <div class="enrollment-container">
        <header class="enrollment-header">
            <h1>SHAKTI Computer & Coaching Center</h1>
            <h2>Student Enrollment Form</h2>
        </header>

        <main class="enrollment-main">
            <form id="enrollmentForm" onsubmit="handleEnrollment(event)">
                <div class="form-section">
                    <h3>Personal Information</h3>
                    
                    <div class="form-group">
                        <label for="fullName">Full Name:</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Course Selection</h3>
                    
                    <div class="form-group">
                        <label for="course">Select Course:</label>
                        <select id="course" name="course" required>
                            <option value="">-- Select a Course --</option>
                            <option value="basic-computer">Basic Computer Skills</option>
                            <option value="web-design">Web Design & Development</option>
                            <option value="programming">Programming (Java, Python)</option>
                            <option value="digital-marketing">Digital Marketing</option>
                            <option value="competitive-exam">Competitive Exam Preparation</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="batch">Preferred Batch Timing:</label>
                        <select id="batch" name="batch" required>
                            <option value="">-- Select Batch Time --</option>
                            <option value="morning">Morning (9 AM - 12 PM)</option>
                            <option value="afternoon">Afternoon (2 PM - 5 PM)</option>
                            <option value="evening">Evening (6 PM - 9 PM)</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Additional Information</h3>
                    
                    <div class="form-group">
                        <label for="experience">Computer Experience:</label>
                        <select id="experience" name="experience" required>
                            <option value="">-- Select Level --</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Comments/Questions:</label>
                        <textarea id="message" name="message" rows="4"></textarea>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="agree" name="agree" required>
                        <label for="agree">I agree to the terms and conditions</label>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Submit Enrollment</button>
            </form>

            <div id="message" class="message"></div>
        </main>

        <footer class="enrollment-footer">
            <p><strong>Phone:</strong> 8571913652</p>
            <p><strong>Email:</strong> kittukapoor671@gmail.com | aysuhkapoor900@gmail.com</p>
        </footer>
    </div>

    <script src="enrollment.js"></script>
</body>
</html>
